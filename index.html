<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KENAME Sport | Experience Oslo '26</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Inter", sans-serif;
  background: #0d0a1f;
  color: #fff;
}

/* HERO SECTION */
.hero {
  height: 100vh;
  background: linear-gradient(
      rgba(13,10,31,0.65),
      rgba(13,10,31,0.85)
    ),
    url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=2000&q=80")
    center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 0 20px;
}

/* MAIN TITLE */
.hero h1 {
  font-size: 72px;
  font-weight: 800;
  letter-spacing: 2px;
  margin: 0;
}

/* OSLO '26 STYLE */
.hero h2 {
  font-family: "Playfair Display", serif;
  font-size: 72px;
  font-weight: 700;
  font-style: italic;
  color: #d4af37;
  margin: 10px 0 10px 0;
}

/* SUB INFO */
.trip-info {
  font-size: 14px;
  font-weight: 300;
  opacity: 0.9;
  line-height: 1.8;
  margin-bottom: 25px;
}

/* COUNTDOWN LABEL */
.countdown-label {
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 2px;
  opacity: 0.7;
  margin-top: 10px;
  margin-bottom: 15px;
}

/* COUNTDOWN WRAPPER */
.countdown {
  display: flex;
  gap: 18px;
  align-items: center;
}

/* BOXES */
.box {
  border: 1px solid rgba(255,255,255,0.4);
  padding: 15px 18px;
  border-radius: 12px;
  min-width: 85px;
  backdrop-filter: blur(6px);
}

/* NUMBERS */
.box span {
  font-size: 34px;
  font-weight: 600;
}

/* LABELS */
.box small {
  display: block;
  font-size: 11px;
  margin-top: 5px;
  opacity: 0.7;
  letter-spacing: 1px;
}

/* COLON BETWEEN */
.colon {
  font-size: 30px;
  opacity: 0.7;
}

/* NAV */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 18px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(13,10,31,0.55);
  backdrop-filter: blur(10px);
}

.nav .logo {
  font-weight: 600;
  letter-spacing: 2px;
}

.nav button {
  background: #d4af37;
  border: none;
  padding: 10px 18px;
  border-radius: 25px;
  font-weight: 600;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">KENAME</div>
  <button>Book Trip</button>
</div>

<section class="hero">

  <h1>EXPERIENCE</h1>
  <h2>OSLO '26</h2>

  <div class="trip-info">
    🗓️ Trip: May 20–24, 2026<br>
    🏆 Final: May 23, 2026<br>
    📍 Oslo, Norway
  </div>

  <div class="countdown-label">COUNTDOWN TO DEPARTURE</div>

  <div class="countdown">
    <div class="box">
      <span id="days">00</span>
      <small>DAYS</small>
    </div>

    <div class="colon">:</div>

    <div class="box">
      <span id="hours">00</span>
      <small>HOURS</small>
    </div>

    <div class="colon">:</div>

    <div class="box">
      <span id="mins">00</span>
      <small>MINS</small>
    </div>

    <div class="colon">:</div>

    <div class="box">
      <span id="secs">00</span>
      <small>SECS</small>
    </div>
  </div>

</section>

<script>
const target = new Date("May 20, 2026 00:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = target - now;

  document.getElementById("days").innerText = Math.floor(diff / (1000*60*60*24));
  document.getElementById("hours").innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  document.getElementById("mins").innerText = Math.floor((diff % (1000*60*60)) / (1000*60));
  document.getElementById("secs").innerText = Math.floor((diff % (1000*60)) / 1000);
}, 1000);
</script>

</body>
</html>
